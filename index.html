<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Permintaan Warehouse</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    :root {
      --primary-color: #0f172a; 
      --secondary-color: #1e293b; 
      --accent-color: #d4af37; 
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      --glass-bg: rgba(255, 255, 255, 0.95);
      --glass-border: rgba(255, 255, 255, 0.6);
      --text-main: #334155;
    }

    body { 
      background: var(--bg-gradient); 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      color: var(--text-main);
      padding: 40px 15px;
      min-height: 100vh;
    }

    #loginOverlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-glass {
      background: rgba(255, 255, 255, 0.03); 
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      padding: 40px 30px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .login-glass .form-label { color: #94a3b8; }
    .login-glass .form-control, .login-glass .form-select {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f8fafc;
    }
    .login-glass .form-control:focus, .login-glass .form-select:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--accent-color);
      color: #fff;
      box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
    }
    .login-glass .form-control::placeholder { color: #64748b; }
    .login-glass .form-select option { background: var(--secondary-color); color: white; }

    #mainForm { display: none; }

    .glass-container {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
      padding: 40px;
      max-width: 1200px;
      margin: auto;
    }

    .header-section { border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; margin-bottom: 30px; }
    .logo { max-height: 60px; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.06)); }

    h3.title-form { font-weight: 800; color: var(--primary-color); letter-spacing: 0.5px; font-size: 24px; margin: 0; }
    .form-label { font-weight: 600; color: #475569; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }

    .form-control, .form-select {
      border-radius: 10px;
      border: 1px solid #cbd5e0;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
      background: #f8fafc;
    }

    .form-control:focus, .form-select:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
      background: #fff;
    }

    .form-control[readonly], .form-select[disabled] { background: #e2e8f0; cursor: not-allowed; color: #64748b; }

    .table-container {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.02);
      margin-top: 25px;
      overflow: hidden; 
    }
    
    thead { background: var(--primary-color); color: #f8fafc; }
    thead th { font-weight: 600; border: none !important; padding: 18px 15px !important; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
    tbody td { vertical-align: middle; border-bottom: 1px solid #f1f5f9; padding: 12px 15px !important; }

    .summary-box {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      border-radius: 16px;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 25px;
      box-shadow: 0 15px 30px rgba(15, 23, 42, 0.15);
    }
    .summary-title { font-size: 14px; font-weight: 500; color: #cbd5e0; text-transform: uppercase; letter-spacing: 1px; }
    .summary-value { font-size: 28px; font-weight: 800; color: var(--accent-color); }

    .btn-custom { border-radius: 10px; font-weight: 600; padding: 12px 24px; transition: all 0.3s; border: none; display: inline-flex; align-items: center; gap: 8px; }
    .btn-add { background-color: #f1f5f9; color: var(--primary-color); border: 1px dashed #94a3b8; }
    .btn-add:hover { background-color: #e2e8f0; border-color: var(--primary-color); }

    .btn-save { background: var(--accent-color); color: var(--primary-color); box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3); }
    .btn-save:hover { background: #c5a030; transform: translateY(-3px); box-shadow: 0 12px 25px rgba(212, 175, 55, 0.4); color: var(--primary-color); }

    .btn-outline-custom { background: transparent; color: var(--primary-color); border: 2px solid #cbd5e0; }
    .btn-outline-custom:hover { border-color: var(--primary-color); background: #f8fafc; }

    .btn-scan { background: var(--primary-color); color: white; border: none; border-radius: 0 10px 10px 0 !important; }
    .btn-scan:hover { background: var(--accent-color); color: var(--primary-color); }

    @media print {
      body { background: #fff; padding: 0; }
      .glass-container { box-shadow: none; border: none; padding: 0; }
      .btn, .action-col, #loginOverlay, .btn-scan { display: none !important; }
      .summary-box { background: #f1f5f9 !important; color: #000 !important; box-shadow: none; border: 1px solid #ccc; }
      .summary-value { color: #000 !important; }
      .form-control, .form-select { border: none !important; padding: 0 !important; background: transparent !important; }
      thead th { background: #eee !important; color: #000 !important; }
    }
  </style>
</head>
<body>

  <div id="loginOverlay">
    <div class="login-glass">
      <h3 style="font-weight: 800; color: var(--accent-color); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;">WH SYSTEM</h3>
      <p style="color: #94a3b8; font-size: 14px; margin-bottom: 35px;">Log in untuk mengakses form</p>
      
      <div class="mb-3 text-start">
        <label class="form-label" style="font-size: 12px;">Departemen / Pengguna</label>
        <select id="loginUser" class="form-select">
          <option value="">-- Silakan Pilih --</option>
          <option value="Quality Control Staff">Quality Control Staff</option>
          <option value="Production Staff">Production Staff</option>
          <option value="Maintenance Staff">Maintenance Staff</option>
          <option value="HSE Staff">HSE Staff</option>
        </select>
      </div>
      
      <div class="mb-4 text-start">
        <label class="form-label" style="font-size: 12px;">Kata Sandi</label>
        <input type="password" id="loginPass" class="form-control" placeholder="Masukkan PIN / Sandi">
      </div>
      
      <button class="btn btn-save w-100 btn-custom justify-content-center mt-2" onclick="prosesLogin()">
        Masuk <i class="bi bi-box-arrow-in-right"></i>
      </button>
    </div>
  </div>

  <div id="mainForm" class="glass-container">
    <div class="d-flex justify-content-between align-items-center header-section">
      <div class="d-flex align-items-center gap-3">
        <img src="https://lh3.googleusercontent.com/d/1TQgIsw0PwBRA4PiBNstT1BrImRCsexK8" alt="Logo" class="logo">
        <div>
          <h3 class="title-form">FORM PERMINTAAN WAREHOUSE</h3>
          <span style="color: #64748b; font-size: 14px; font-weight: 500;">Distribusi Material Utama & Consumables</span>
        </div>
      </div>
      <div style="text-align: right; font-size: 13px; font-weight: 600; color: #475569; background: #f8fafc; padding: 12px 20px; border-radius: 12px; border: 1px solid #e2e8f0;">
        <div style="color: var(--primary-color);">No. Form : MSB/F-WH-002</div>
        <div>Revisi : Rev.00</div>
      </div>
    </div>
    
    <div class="row g-4 mb-4">
      <div class="col-md-3">
        <label class="form-label">No Permintaan</label>
        <input type="text" id="no" class="form-control" readonly>
      </div>
      <div class="col-md-3">
        <label class="form-label">Waktu Permintaan</label>
        <input type="datetime-local" id="waktu" class="form-control" readonly>
      </div>
      <div class="col-md-3">
        <label class="form-label">Departemen</label>
        <select id="dept" class="form-select" disabled>
          <option value="Production">Production</option>
          <option value="Quality Control">Quality Control</option>
          <option value="HSE">HSE</option>
          <option value="Maintenance">Maintenance</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Dibuat Oleh</label>
        <input type="text" id="dibuat" class="form-control" readonly>
      </div>
    </div>

    <datalist id="listBarang"></datalist>

    <div class="table-container">
      <table class="table mb-0" id="tblBarang">
        <thead>
          <tr>
            <th style="width: 35%;">Cari / Scan Barang (ID)</th>
            <th style="width: 25%;">Nama Barang</th>
            <th style="width: 15%;">Ukuran</th>
            <th style="width: 12%;">Jumlah</th>
            <th style="width: 10%;">Catatan</th>
            <th class="action-col" style="text-align: center; width: 3%;">Aksi</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    
    <div class="mt-3">
      <button class="btn btn-custom btn-add" onclick="addRow()">
        <i class="bi bi-plus-circle"></i> Tambah Baris
      </button>
    </div>

    <div class="summary-box">
      <div>
        <div class="summary-title">Total Jenis Barang</div>
        <div class="summary-value" id="totalBaris" style="color: white; font-size: 20px;">0 Item</div>
      </div>
      <div class="text-end">
        <div class="summary-title">Grand Total Kuantitas</div>
        <div class="summary-value" id="grandTotalKuantitas">0</div>
      </div>
    </div>
    
    <hr class="my-5" style="border-color: #cbd5e0;">
    
    <div class="d-flex gap-3 justify-content-end">
      <button class="btn btn-custom btn-outline-custom" onclick="window.print()">
        <i class="bi bi-printer"></i> Cetak
      </button>
      <button class="btn btn-custom btn-save" id="btnSimpan" onclick="simpan()">
        <i class="bi bi-send-check-fill"></i> Simpan Permintaan
      </button>
    </div>

  </div>

  <div class="modal fade" id="scannerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius: 20px; overflow: hidden; border: none;">
        <div class="modal-header" style="background: var(--primary-color); color: white; border: none;">
          <h5 class="modal-title" style="font-weight: 600;"><i class="bi bi-upc-scan"></i> Scan Kode Batang</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" onclick="stopScanner()"></button>
        </div>
        <div class="modal-body p-0">
          <div id="reader" width="100%"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // =========================================================================
    // PASTE KAN LINK WEB APP HASIL DEPLOY DI SINI:
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbypdohAAbxO0q-6CjHeYU6HMNWr6pVyaPSGyyYGDw5cZ5kltj9CXgtl16MpOMfxRQdgqw/exec";
    // =========================================================================

    let stockData = [];
    let html5QrcodeScanner = null;
    let targetInputRow = null;

    const userCredentials = {
      "Quality Control Staff": { pass: "11111", dept: "Quality Control" },
      "Production Staff":      { pass: "11112", dept: "Production" },
      "Maintenance Staff":     { pass: "11113", dept: "Maintenance" },
      "HSE Staff":             { pass: "11114", dept: "HSE" }
    };

    function prosesLogin() {
      const user = document.getElementById('loginUser').value;
      const pass = document.getElementById('loginPass').value;

      if (!user) { alert("Pilih pengguna terlebih dahulu!"); return; }

      if (userCredentials[user].pass === pass) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainForm').style.display = 'block';
        
        document.getElementById('dept').value = userCredentials[user].dept;
        document.getElementById('dibuat').value = user; 
      } else {
        alert("Katasandi salah! Silakan coba lagi.");
        document.getElementById('loginPass').value = '';
      }
    }

    function setWaktuSekarang() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById('waktu').value = now.toISOString().slice(0, 16);
    }

    window.onload = () => {
      setWaktuSekarang();
      muatDataAwalRealtime();
    };

    // Fungsi Fetch data Real-time pengganti google.script.run
    function muatDataAwalRealtime() {
      if (!WEB_APP_URL || WEB_APP_URL === "TEMPEL_URL_WEB_APP_ANDA_DI_SINI") {
        console.warn("Membuka dengan data simulasi (URL API belum dipasang).");
        gunakanDataDummy();
        return;
      }

      fetch(`${WEB_APP_URL}?action=getInitialData`)
        .then(response => response.json())
        .then(res => {
          stockData = res.stock;
          document.getElementById('no').value = res.newNo;
          siapkanDatalist();
          // Kosongkan baris lama jika ada, lalu isi satu baris awal
          document.querySelector('#tblBarang tbody').innerHTML = '';
          addRow();
        })
        .catch(err => {
          console.error("Gagal terhubung dengan real-time database:", err);
          alert("Gagal sinkronisasi data sheet. Menggunakan mode simulasi offline.");
          gunakanDataDummy();
        });
    }

    function gunakanDataDummy() {
      stockData = [
        { id: "BRG001", nama: "Besi Plat 10mm", ukuran: "10mm", sisa: 50 },
        { id: "BRG002", nama: "Baut Baja Ringan", ukuran: "M8", sisa: 100 },
        { id: "BRG003", nama: "Cat Anti Karat", ukuran: "25 Kg", sisa: 5 }
      ];
      document.getElementById('no').value = "REQ-001";
      siapkanDatalist();
      document.querySelector('#tblBarang tbody').innerHTML = '';
      addRow();
    }

    function siapkanDatalist() {
      const list = document.getElementById('listBarang');
      list.innerHTML = stockData.map(s => `<option value="${s.id}">${s.id} - ${s.nama} (Sisa: ${s.sisa})</option>`).join('');
    }

    function addRow() {
      const tbody = document.querySelector('#tblBarang tbody');
      const tr = document.createElement('tr');
      
      tr.innerHTML = `
        <td>
          <div class="input-group">
            <input type="text" class="form-control id-brg" list="listBarang" placeholder="Ketik/Scan ID..." onchange="isiOtomatis(this)">
            <button class="btn btn-scan" type="button" onclick="bukaScanner(this)" title="Scan Barcode"><i class="bi bi-camera"></i></button>
          </div>
        </td>
        <td><input type="text" class="form-control nama" readonly></td>
        <td><input type="text" class="form-control ukuran" readonly></td>
        <td><input type="number" class="form-control jml" min="1" placeholder="0" oninput="cekStok(this)"></td>
        <td><input type="text" class="form-control catatan" placeholder="..."></td>
        <td class="action-col" style="text-align: center;">
          <button class="btn btn-outline-danger btn-sm rounded-circle shadow-sm" onclick="hapusBaris(this)" style="width: 35px; height: 35px;"><i class="bi bi-trash-fill"></i></button>
        </td>
      `;
      tbody.appendChild(tr);
      hitungTotal();
    }

    function hapusBaris(btn) {
      btn.parentElement.parentElement.remove();
      hitungTotal();
    }

    function cekStok(el) {
      const maxStock = parseInt(el.getAttribute('max'));
      let currentVal = parseInt(el.value);
      
      if (!isNaN(maxStock) && currentVal > maxStock) {
        alert(`Peringatan: Jumlah melampaui persediaan.\nSisa stok untuk barang ini hanya tersedia ${maxStock}.`);
        el.value = maxStock;
      }
      hitungTotal();
    }

    function isiOtomatis(el) {
      const row = el.closest('tr');
      const selectedItem = stockData.find(s => s.id === el.value.trim());
      const inputJml = row.querySelector('.jml');
      
      if (selectedItem) {
        row.querySelector('.nama').value = selectedItem.nama;
        row.querySelector('.ukuran').value = selectedItem.ukuran;
        
        inputJml.setAttribute('max', selectedItem.sisa);
        inputJml.placeholder = `Max: ${selectedItem.sisa}`;
        
        if (inputJml.value && parseInt(inputJml.value) > selectedItem.sisa) {
           inputJml.value = selectedItem.sisa;
           alert(`Peringatan: Stok hanya tersedia ${selectedItem.sisa}. Jumlah otomatis disesuaikan.`);
           hitungTotal();
        }
        inputJml.focus(); 
      } else {
        row.querySelector('.nama').value = '';
        row.querySelector('.ukuran').value = '';
        inputJml.removeAttribute('max');
        inputJml.placeholder = "0";
      }
    }

    function hitungTotal() {
      const rows = document.querySelectorAll('#tblBarang tbody tr');
      let grandTotal = 0;
      let validRows = 0;

      rows.forEach(r => {
        const idVal = r.querySelector('.id-brg').value;
        const jml = parseInt(r.querySelector('.jml').value) || 0;
        if (idVal.trim() !== '') validRows++;
        grandTotal += jml;
      });

      document.getElementById('totalBaris').innerText = validRows + " Item";
      document.getElementById('grandTotalKuantitas').innerText = grandTotal.toLocaleString('id-ID');
    }

    function bukaScanner(btn) {
      targetInputRow = btn.previousElementSibling; 
      const modal = new bootstrap.Modal(document.getElementById('scannerModal'));
      modal.show();

      html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} });
      html5QrcodeScanner.render(onScanSuccess, onScanError);
    }

    function onScanSuccess(decodedText, decodedResult) {
      stopScanner(); 
      const modal = bootstrap.Modal.getInstance(document.getElementById('scannerModal'));
      modal.hide(); 
      
      if(targetInputRow) {
        targetInputRow.value = decodedText;
        isiOtomatis(targetInputRow);
      }
    }

    function onScanError(errorMessage) {}

    function stopScanner() {
      if (html5QrcodeScanner) {
        html5QrcodeScanner.clear().catch(error => console.error("Gagal menutup scanner", error));
      }
    }

    document.getElementById('scannerModal').addEventListener('hidden.bs.modal', function () {
      stopScanner();
    });

    // Fungsi Simpan Menggunakan Fetch API POST dengan redirect handler (CORS Safe)
    function simpan() {
      const dibuat = document.getElementById('dibuat').value;

      if(!dibuat.trim()){ alert("Gagal mendeteksi User. Silakan muat ulang halaman."); return; }

      const rows = document.querySelectorAll('#tblBarang tbody tr');
      if(rows.length === 0) { alert("Tabel barang tidak boleh kosong!"); return; }

      let valid = true;
      let itemsToSave = [];
      
      rows.forEach(r => {
        const id = r.querySelector('.id-brg').value.trim();
        const jml = r.querySelector('.jml').value;
        if(id) {
          itemsToSave.push({
            id: id,
            nama: r.querySelector('.nama').value,
            ukuran: r.querySelector('.ukuran').value,
            jml: jml,
            catatan: r.querySelector('.catatan').value
          });
        } else {
           valid = false;
        }
      });

      if(itemsToSave.length === 0 || !valid) {
        alert("Pastikan Anda sudah memilih barang pada setiap baris yang tersedia!");
        return;
      }

      const btnSave = document.getElementById('btnSimpan');
      btnSave.disabled = true;
      btnSave.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Menyimpan...';

      const rawTime = document.getElementById('waktu').value;
      const data = {
        no: document.getElementById('no').value,
        waktu: rawTime.replace('T', ' '),
        dept: document.getElementById('dept').value, 
        dibuat: dibuat, 
        items: itemsToSave
      };
      
      if (!WEB_APP_URL || WEB_APP_URL === "TEMPEL_URL_WEB_APP_ANDA_DI_SINI") {
         alert("Simulasi Simpan Sukses (Mode Offline). Form dikosongkan.");
         resetFormSetelahSimpan();
         return;
      }

      // Kirim data ke Google Sheets API secara asynchronous
      fetch(WEB_APP_URL, {
        method: "POST",
        mode: "cors",
        headers: { "Content-Type": "text/plain" }, // Menggunakan text/plain mencegah CORS preflight error di GAS
        body: JSON.stringify({ action: "simpan", payload: data })
      })
      .then(response => response.json())
      .then(res => {
        if(res.status === "Sukses") {
          alert("Data Permintaan WH Berhasil Disimpan ke Spreadsheet!");
          resetFormSetelahSimpan();
        } else {
          alert("Gagal Menyimpan: " + res.message);
          btnSave.disabled = false;
          btnSave.innerHTML = '<i class="bi bi-send-check-fill"></i> Simpan Permintaan';
        }
      })
      .catch(err => {
        console.error("Error saat menyimpan data:", err);
        alert("Terjadi gangguan jaringan saat menyimpan data.");
        btnSave.disabled = false;
        btnSave.innerHTML = '<i class="bi bi-send-check-fill"></i> Simpan Permintaan';
      });
    }

    function resetFormSetelahSimpan() {
      const btnSave = document.getElementById('btnSimpan');
      // Memperbarui sisa stock & No REQ terbaru langsung dari sheet setelah sukses simpan
      fetch(`${WEB_APP_URL}?action=getInitialData`)
        .then(response => response.json())
        .then(newData => {
          stockData = newData.stock;
          document.getElementById('no').value = newData.newNo;
          siapkanDatalist();
          
          const tbody = document.querySelector('#tblBarang tbody');
          tbody.innerHTML = ''; 
          addRow(); 
          
          btnSave.disabled = false;
          btnSave.innerHTML = '<i class="bi bi-send-check-fill"></i> Simpan Permintaan';
        })
        .catch(() => {
          gunakanDataDummy();
          btnSave.disabled = false;
          btnSave.innerHTML = '<i class="bi bi-send-check-fill"></i> Simpan Permintaan';
        });
    }
  </script>
</body>
</html>
